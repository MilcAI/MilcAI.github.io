<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Milán AI - Végleges Megoldás</title>
    <style>
        :root { --accent: #4285f4; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .orb { 
            width: 150px; height: 150px; border-radius: 50%; 
            background: radial-gradient(circle, #4285f4 0%, #000 90%); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 80px; cursor: pointer; transition: 0.4s;
            box-shadow: 0 0 40px rgba(66, 133, 244, 0.4);
        }
        .listening { transform: scale(1.1); box-shadow: 0 0 60px #4285f4; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #res { margin-top: 30px; padding: 25px; width: 85%; max-width: 500px; background: rgba(255,255,255,0.05); border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="orb" id="orb">M</div>
    <div id="res">Milán, kattints rám és mondd: "Szia!"</div>

    <script>
        const KEY = "AIzaSyBgYxmc5B9sj0v3DkhcyXhEzwZYOpb6abs"; 

        const orb = document.getElementById('orb');
        const resBox = document.getElementById('res');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hu-HU';

        orb.onclick = () => { 
            recognition.start(); 
            orb.classList.add('listening'); 
            resBox.innerText = "Hallgatom a hangod...";
        };

        recognition.onresult = async (event) => {
            const speech = event.results[0][0].transcript;
            orb.classList.remove('listening');
            resBox.innerText = "Gondolkodom...";

            // Megpróbáljuk a hívást
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Te Milán hűséges AI-ja vagy. Válaszolj magyarul, röviden: " + speech }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    const reply = data.candidates[0].content.parts[0].text;
                    resBox.innerText = reply;
                    const u = new SpeechSynthesisUtterance(reply);
                    u.lang = 'hu-HU';
                    window.speechSynthesis.speak(u);
                } else {
                    resBox.innerText = "Sajnos a Google még mindig nem enged be. Ellenőrizd az 'Enable' gombot a Cloud-ban!";
                }
            } catch (e) {
                resBox.innerText = "Kapcsolódási hiba. Próbáld meg megnyitni a fájlt közvetlenül a gépedről!";
            }
        };
    </script>
</body>
</html>
