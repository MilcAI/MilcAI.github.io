<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milán AI - ChatGPT Motor</title>
    <style>
        :root { --accent: #10a37f; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* ChatGPT Gömb */
        .milan-orb { 
            width: 150px; height: 150px; border-radius: 50%; 
            background: radial-gradient(circle, var(--accent) 0%, #000 90%); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 80px; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 0 40px rgba(16, 163, 127, 0.3); border: 2px solid rgba(255,255,255,0.1);
            user-select: none;
        }

        .listening { transform: scale(1.1); box-shadow: 0 0 60px var(--accent); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        #res-box { margin-top: 30px; padding: 25px; width: 85%; max-width: 600px; background: rgba(255,255,255,0.05); border-radius: 20px; text-align: center; font-size: 1.2rem; min-height: 80px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        #status { margin-top: 15px; color: #10a37f; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="milan-orb" id="orb">M</div>
    <div id="status">KATTINTS ÉS BESZÉLJ</div>
    <div id="res-box">Szia Milán! A ChatGPT motor készen áll. Mondj valamit!</div>

    <script>
        // --- KONFIGURÁCIÓ ---
        const OPENAI_KEY = "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"; 
        const JOIN_KEY = "37fb0c375bfc4db18eea3d9148f7200e";
        const DEVICE_ID = "52f9bb814cc24dba8457407666fd1464";

        const orb = document.getElementById('orb');
        const resBox = document.getElementById('res-box');
        const statusTxt = document.getElementById('status');
        
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hu-HU';

        orb.onclick = () => {
            try {
                recognition.start();
                orb.classList.add('listening');
                statusTxt.innerText = "HALLGATLAK...";
            } catch(e) { console.log("Már hallgat..."); }
        };

        recognition.onresult = async (event) => {
            const userSpeech = event.results[0][0].transcript;
            const textLower = userSpeech.toLowerCase();
            orb.classList.remove('listening');
            resBox.innerText = "Gondolkodom...";

            // 1. SPOTIFY ELLENŐRZÉS
            if (textLower.includes("játszd le") || textLower.includes("indítsd el")) {
                const song = userSpeech.replace(/játszd le a|indítsd el a|milán/gi, "").trim();
                const spotifyUri = `spotify:search:${encodeURIComponent(song)}`;
                const joinUrl = `https://joinjoaomgcd.appspot.com/_ah/api/messaging/v1/sendPush?url=${encodeURIComponent(spotifyUri)}&text=${encodeURIComponent("Play: " + song)}&app=Spotify&deviceId=${DEVICE_ID}&apikey=${JOIN_KEY}`;
                
                fetch(joinUrl, { mode: 'no-cors' });
                speak("Rendben Milán, indítom a Spotify-on: " + song);
                return;
            }

            // 2. CHATGPT (OPENAI) HÍVÁS
            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENAI_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            { role: "system", content: "Te Milán hűséges magyar AI asszisztense vagy. Válaszolj röviden és barátságosan." },
                            { role: "user", content: userSpeech }
                        ]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    // Ha nincs egyenleged, itt fogja kiírni: "insufficient_quota"
                    resBox.innerText = "Hiba: " + data.error.message;
                    console.error(data.error);
                } else if (data.choices && data.choices[0].message) {
                    speak(data.choices[0].message.content);
                }

            } catch (e) {
                resBox.innerText = "Hálózati hiba történt.";
            }
            statusTxt.innerText = "KATTINTS ÉS BESZÉLJ";
        };

        function speak(text) {
            resBox.innerText = text;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hu-HU';
            window.speechSynthesis.speak(utter);
        }
    </script>
</body>
</html>
