<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Milán AI - Gemini FIX</title>
    <style>
        :root { --accent: #4285f4; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .milan-orb { width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle, #4285f4 0%, #000 90%); display: flex; align-items: center; justify-content: center; font-size: 80px; cursor: pointer; transition: 0.4s; box-shadow: 0 0 40px rgba(66, 133, 244, 0.3); }
        .listening { transform: scale(1.1); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #res-box { margin-top: 30px; padding: 25px; width: 85%; max-width: 600px; background: rgba(255,255,255,0.05); border-radius: 20px; text-align: center; font-size: 1.2rem; min-height: 80px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="milan-orb" id="orb">M</div>
    <div id="res-box">Most már tényleg megszólalok! Kattints és beszélj!</div>

    <script>
        // A kulcsodat hagyd meg ilyennek!
        const GEMINI_KEY = "AIzaSyBgYxmc5B9sj0v3DkhcyXhEzwZYOpb6abs"; 
        
        const orb = document.getElementById('orb');
        const resBox = document.getElementById('res-box');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hu-HU';

        orb.onclick = () => { recognition.start(); orb.classList.add('listening'); };

        recognition.onresult = async (event) => {
            const userSpeech = event.results[0][0].transcript;
            orb.classList.remove('listening');
            resBox.innerText = "Gondolkodom...";

            try {
                // ITT A VÉGLEGES JAVÍTÁS (v1beta és flash-latest)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${GEMINI_KEY}`;
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Válaszolj magyarul, röviden: " + userSpeech }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    const reply = data.candidates[0].content.parts[0].text;
                    resBox.innerText = reply;
                    const utter = new SpeechSynthesisUtterance(reply);
                    utter.lang = 'hu-HU';
                    window.speechSynthesis.speak(utter);
                } else {
                    resBox.innerText = "Hiba: " + (data.error ? data.error.message : "Próbáld újra!");
                }
            } catch (e) {
                resBox.innerText = "Hálózati hiba. Futtasd a fájlt a saját gépedről!";
            }
        };
    </script>
</body>
</html>
