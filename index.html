<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Milán AI - ChatGPT Fix</title>
    <style>
        :root { --accent: #10a37f; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .milan-orb { width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle, var(--accent) 0%, #000 90%); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 80px; box-shadow: 0 0 40px rgba(16, 163, 127, 0.3); }
        .listening { transform: scale(1.1); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #res-box { margin-top: 30px; padding: 20px; width: 80%; max-width: 500px; background: rgba(255,255,255,0.1); border-radius: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="milan-orb" id="orb">M</div>
    <div id="res-box">Szia! Kattints rám és beszélj!</div>

    <script>
        const OPENAI_KEY = "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"; 

        const orb = document.getElementById('orb');
        const resBox = document.getElementById('res-box');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hu-HU';

        orb.onclick = () => { recognition.start(); orb.classList.add('listening'); };

        recognition.onresult = async (event) => {
            const speech = event.results[0][0].transcript;
            orb.classList.remove('listening');
            resBox.innerText = "Gondolkodom...";

            try {
                // OpenAI hívás
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENAI_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [{ role: "user", content: speech }]
                    })
                });

                const data = await response.json();
                if (data.error) {
                    resBox.innerText = "Hiba: " + data.error.message;
                } else {
                    const reply = data.choices[0].message.content;
                    resBox.innerText = reply;
                    const u = new SpeechSynthesisUtterance(reply);
                    u.lang = 'hu-HU';
                    window.speechSynthesis.speak(u);
                }
            } catch (e) {
                resBox.innerText = "Hálózati hiba. Próbáld meg a saját gépedről futtatni a fájlt!";
            }
        };
    </script>
</body>
</html>
